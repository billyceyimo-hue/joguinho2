<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Simples</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        h1 {
            margin-bottom: 20px;
        }
        #message {
            margin-top: 20px;
            font-size: 20px;
            color: #333;
            height: 30px;
        }
        #hearts {
            margin-top: 20px;
            font-size: 30px;
            color: red;
            display: none;
        }
        #clickButton {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>bem-vinda meu amor</h1>
    <button id="clickButton">Clique aqui</button>
    <div id="message"></div>
    <div id="hearts">❤️❤️❤️</div>

    <script>
        const button = document.getElementById('clickButton');
        const message = document.getElementById('message');
        const hearts = document.getElementById('hearts');

        button.addEventListener('click', () => {
            message.textContent = 'Está pronto para o que vai aparecer...';
            hearts.style.display = 'none'; // Esconde os corações
            setTimeout(() => {
                message.textContent = 'Eu te amo minha vida!!';
                hearts.style.display = 'block'; // Mostra os corações
            }, 5000); // 5 segundos
        });
    </script>

</body>
</html>
